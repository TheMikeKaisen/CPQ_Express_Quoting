<template>
    <div class="page-container">

        <!-- HEADER -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Resource Roles</h1>
                <p class="page-subtitle">
                    Manage Resource Roles and
                    billing prices for your organization
                </p>
            </div>
            <div class="header-right">
                <template if:true={isManager}>
                    <button class="btn-new"
                            onclick={handleNew}>
                        + New
                    </button>
                    <button class="btn-import" onclick={handleImportClick}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; margin-bottom: -2px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Import
                    </button>
                    <input type="file" accept=".csv" class="hidden-csv-input" style="display: none;" onchange={handleFileChange} />
                </template>
                <button class="btn-icon"
                        onclick={handleRefresh}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; margin-bottom: -2px;"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- FILTERS -->
        <div class="filters-row">
            <input
                type="text"
                class="search-input"
                placeholder="Search Resource Roles
                             by name or location..."
                onchange={handleSearch} />
            <select class="filter-select"
                    onchange={handleStatusFilter}>
                <option value="All">All Status</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>

        <div class="showing-count">
            Showing {startRecord}-{endRecord}
            of {totalRecords}
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th><input type="checkbox" /></th>
                        <th>#</th>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Location</th>
                        <th>Billing Unit</th>
                        <th>Price</th>
                        <th>Cost</th>
                        <template if:true={isManager}>
                            <th>Active</th>
                            <th>Actions</th>
                        </template>
                    </tr>
                </thead>
                <tbody>
                    <template if:true={isEmpty}>
                        <tr>
                            <td colspan="10" class="empty-cell">
                                No resource roles found.
                            </td>
                        </tr>
                    </template>
                    <template for:each={paginatedRoles}
                              for:item="role">
                        <tr key={role.Id} class="table-row">
                            <td>
                                <input type="checkbox" />
                            </td>
                            <td>{role.rowNumber}</td>
                            <td>
                                <template if:true={isManager}>
                                    <span class="id-link"
                                          onclick={handleEdit}
                                          data-id={role.Id}>
                                        {role.Name}
                                    </span>
                                </template>
                                <template if:false={isManager}>
                                    <span>{role.Name}</span>
                                </template>
                            </td>
                            <td>{role.displayName}</td>
                            <td>{role.locationDisplay}</td>
                            <td>
                                <span class="billing-badge">
                                    {role.Billing_Unit__c}
                                </span>
                            </td>
                            <td class="price-cell">
                                {role.formattedPrice}
                            </td>
                            <td class="price-cell">
                                {role.formattedCost}
                            </td>
                            <template if:true={isManager}>
                                <td>
                                    <label class="toggle-wrap">
                                        <input
                                            type="checkbox"
                                            class="toggle-input"
                                            checked={role.Is_Active__c}
                                            data-id={role.Id}
                                            onchange={handleToggle} />
                                        <span class="toggle-slider">
                                        </span>
                                    </label>
                                </td>
                                <td>
                                    <button
                                        class="action-btn"
                                        data-id={role.Id}
                                        onclick={handleDelete}
                                        title="Delete">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                    </button>
                                </td>
                            </template>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- PAGINATION -->
        <div class="pagination">
            <button class="page-btn"
                    onclick={handlePrevPage}
                    disabled={isFirstPage}>
                ‹ Previous
            </button>
            <span class="page-info">
                Page {currentPage} of {totalPages}
            </span>
            <button class="page-btn"
                    onclick={handleNextPage}
                    disabled={isLastPage}>
                Next ›
            </button>
        </div>

    </div>

    <!-- NEW ROLE MODAL -->
    <template if:true={showModal}>
        <div class="modal-overlay"
             onclick={handleModalClose}>
        </div>
        <div class="modal-box">
            <div class="modal-header">
                <h2 class="modal-title">{modalTitle}</h2>
                <button class="close-btn"
                        onclick={handleModalClose}>✕
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">
                        Name <span class="req">*</span>
                    </label>
                    <input type="text"
                           class="form-input"
                           placeholder="e.g. QA Lead"
                           value={formData.name}
                           onchange={handleFieldChange}
                           data-field="name" />
                </div>
                <div class="form-group">
                    <label class="form-label">Location</label>
                    <input type="text"
                           class="form-input"
                           placeholder="e.g. Remote"
                           value={formData.location}
                           onchange={handleFieldChange}
                           data-field="location" />
                </div>
                <div class="form-group">
                    <label class="form-label">
                        Billing Unit <span class="req">*</span>
                    </label>
                    <select class="form-select"
                            value={formData.billingUnit}
                            onchange={handleFieldChange}
                            data-field="billingUnit">
                        <option value="Hour">Hour</option>
                        <option value="Each">Each</option>
                        <option value="Day">Day</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group form-half">
                        <label class="form-label">
                            Price <span class="req">*</span>
                        </label>
                        <div class="input-with-prefix">
                            <span class="prefix-symbol">$</span>
                            <input type="number"
                                   class="form-input"
                                   placeholder="0.00"
                                   value={formData.price}
                                   onchange={handleFieldChange}
                                   data-field="price" />
                        </div>
                    </div>
                    <div class="form-group form-half">
                        <label class="form-label">Cost <span class="req">*</span></label>
                        <div class="input-with-prefix">
                            <span class="prefix-symbol">$</span>
                            <input type="number"
                                   class="form-input"
                                   placeholder="0.00"
                                   value={formData.cost}
                                   onchange={handleFieldChange}
                                   data-field="cost" />
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Tags</label>
                    <input type="text"
                           class="form-input"
                           placeholder="e.g. QA, Testing"
                           value={formData.tags}
                           onchange={handleFieldChange}
                           data-field="tags" />
                </div>
                <template if:true={errorMessage}>
                    <div class="error-msg">{errorMessage}</div>
                </template>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel"
                        onclick={handleModalClose}>
                    Cancel
                </button>
                <button class="btn-save"
                        onclick={handleSave}
                        disabled={isSaving}>
                    <template if:true={isSaving}>
                        Saving...
                    </template>
                    <template if:false={isSaving}>
                        Save
                    </template>
                </button>
            </div>
        </div>
    </template>

</template>
