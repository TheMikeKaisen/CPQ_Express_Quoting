<template>
    <div class="dashboard-container">

        <!-- TOP BAR: Greeting & System Actions -->
        <div class="page-top-bar">
            <div class="greeting-section">
                <span class="greeting-emoji">{greetingEmoji}</span>
                <div class="greeting-text">
                    <h1>{timeGreeting}, {currentUserName}!</h1>
                </div>
            </div>
            <div class="top-actions">
                <button class="btn-secondary" onclick={handleRefresh}>
                    <span class="icon-refresh">🔄</span> Refresh
                </button>
                
            </div>
        </div>

        <!-- SEARCH BAR: AI Prompt Centered -->
        <div class="ai-search-container">

            
            <div class="quick-try-scroll">
                <span class="try-label">💡 Try:</span>
                <div class="chips-container">
                    <button class="chip" onclick={handleChipClick} data-action="createQuote">Help me create quote</button>
                    <button class="chip" onclick={handleChipClick} data-action="showQuotes">Show all quotes</button>
                    <button class="chip" onclick={handleChipClick} data-action="listAccounts">List accounts</button>
                    <button class="chip" onclick={handleChipClick} data-action="showRoles">Show all resource roles</button>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- LEFT PANEL: Insights -->
            <div class="insights-panel">
                <h2 class="panel-title">Quote Insights</h2>
                
                <div class="insight-cards-row">
                    <!-- Awaiting Approval (Yellow) - Manager/Admin only -->
                    <template if:true={isManager}>
                        <div class="insight-card" data-page="quotes" data-filter="Pending Approval" onclick={handleViewNav}>
                            <div class="card-border-accent yellow"></div>
                            <div class="card-header">
                                <span class="card-info-icon">ⓘ</span>
                            </div>
                            <div class="card-main">
                                <span class="count-large text-yellow">{awaitingCount}</span>
                                <span class="card-name">Awaiting Your Approval</span>
                                <span class="card-detail">{awaitingAmount} pending your review</span>
                            </div>
                            <button class="card-action">Review Now →</button>
                        </div>
                    </template>

                    <!-- Low Margin Drafts (Red) -->
                    <div class="insight-card" data-page="quotes" data-filter="Draft" onclick={handleViewNav}>
                        <div class="card-border-accent red"></div>
                        <div class="card-header">
                            <span class="card-info-icon">ⓘ</span>
                        </div>
                        <div class="card-main">
                            <span class="count-large text-red">{lowMarginCount}</span>
                            <span class="card-name">Low Margin Drafts</span>
                            <span class="card-detail">{lowMarginCount} draft quotes at risk - margins below 15%</span>
                        </div>
                        <button class="card-action red-action">Review Margins →</button>
                    </div>

                    <!-- Draft Pipeline (Purple) -->
                    <div class="insight-card" data-page="quotes" data-filter="Draft" onclick={handleViewNav}>
                        <div class="card-border-accent purple"></div>
                        <div class="card-header">
                            <span class="card-info-icon">ⓘ</span>
                        </div>
                        <div class="card-main">
                            <span class="count-large text-purple">{draftCount}</span>
                            <span class="card-name">Draft Pipeline</span>
                            <span class="card-detail">{draftAmount} potential revenue in drafts</span>
                        </div>
                        <button class="card-action purple-action">View Drafts →</button>
                    </div>

                    <!-- High Margin Deals (Cyan) -->
                    <div class="insight-card" data-page="quotes" data-filter="Approved" onclick={handleViewNav}>
                        <div class="card-border-accent cyan"></div>
                        <div class="card-header">
                            <span class="card-info-icon">ⓘ</span>
                        </div>
                        <div class="card-main">
                            <span class="count-large text-cyan">{highMarginCount}</span>
                            <span class="card-name">High Margin Deals</span>
                            <span class="card-detail">{highMarginAmount} with 35%+ profit margin</span>
                        </div>
                        <button class="card-action cyan-action">View Opportunities →</button>
                    </div>

                    <!-- Won This Month (Green) -->
                    <div class="insight-card" data-page="quotes" data-filter="Approved" onclick={handleViewNav}>
                        <div class="card-border-accent green"></div>
                        <div class="card-header">
                            <span class="card-info-icon">ⓘ</span>
                        </div>
                        <div class="card-main">
                            <span class="count-large text-green">{wonCount}</span>
                            <span class="card-name">Won This Month</span>
                            <span class="card-detail">{wonAmount} closed won this month</span>
                        </div>
                        <button class="card-action green-action">View Wins →</button>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: Quotes Sidebar -->
            <div class="quotes-sidebar">
                <div class="sidebar-header">
                    <h2>Your Draft Quotes</h2>
                    <span class="quote-count">{totalQuoteCount} quotes total</span>
                </div>

                <!-- Status Filter Tabs -->
                <div class="filter-tabs">
                    <button class={allTabClass} data-status="All" onclick={handleFilterClick}>All</button>
                    <button class={draftTabClass} data-status="Draft" onclick={handleFilterClick}>Draft</button>
                    <button class={pendingTabClass} data-status="Pending Approval" onclick={handleFilterClick}>Pending</button>
                    <button class={approvedTabClass} data-status="Approved" onclick={handleFilterClick}>Approved</button>
                    <button class={rejectedTabClass} data-status="Rejected" onclick={handleFilterClick}>Rejected</button>
                </div>

                <button class="btn-primary-full" onclick={handleCreateQuote}>
                    <span class="plus-icon">+</span> Create New Quote
                </button>

                <div class="quotes-list-container">
                    <template if:true={hasRecentQuotes}>
                        <template for:each={recentQuotes} for:item="quote">
                            <div key={quote.Id} class="quote-item-row" data-id={quote.Id} onclick={handleRecentQuoteClick}>
                                <div class="item-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                        <polyline points="14 2 14 8 20 8"/>
                                        <line x1="16" y1="13" x2="8" y2="13"/>
                                        <line x1="16" y1="17" x2="8" y2="17"/>
                                        <polyline points="10 9 9 9 8 9"/>
                                    </svg>
                                </div>
                                <div class="item-info">
                                    <div class="item-name-row">
                                        <span class="q-number">{quote.QuoteNumber}</span>
                                        <span class="status-pill">{quote.Status}</span>
                                    </div>
                                    <div class="item-time">{quote.timeAgo}</div>
                                </div>
                                <div class="item-price">{quote.formattedAmount}</div>
                            </div>
                        </template>
                    </template>
                    
                    <template if:false={hasRecentQuotes}>
                        <div class="empty-state">
                            <p>No quotes found for this filter.</p>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <c-provus-create-quote-modal
            is-open={showCreateModal}
            onclose={handleModalClose}
            onquotecreated={handleQuoteCreated}>
        </c-provus-create-quote-modal>
    </div>
</template>
