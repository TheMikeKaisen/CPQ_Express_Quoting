<template>
    <div class="line-items-container">

        <!-- TOP BAR -->
        <div class="line-items-header">
            <div class="header-left">
                <button class="btn-collapse" onclick={handleCollapseAll}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; margin-bottom: -2px;">
                        <polyline points="18 15 12 9 6 15"></polyline>
                    </svg>
                    Collapse All
                </button>
            </div>
            <div class="header-right">
                <template if:false={isLocked}>
                    <button class="btn-add-phase" onclick={handleAddPhase}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-right: 4px; margin-bottom: -2px;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                        Add Phase
                    </button>
                    <button class="btn-add-item" onclick={handleAddItem}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            style="margin-right: 6px; margin-bottom: -3px;">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Add Item
                    </button>
                </template>
                <template if:true={isLocked}>
                    <span style="font-size:13px;color:#9ca3af;font-style:italic;">🔒 Quote is locked</span>
                </template>
            </div>
        </div>

        <!-- LINE ITEMS TABLE -->
        <div class="table-wrapper">
            <table class="items-table">
                <thead>
                    <tr>
                        <th class="col-check">
                            <input type="checkbox" onchange={handleSelectAll} checked={isAllSelected} />
                        </th>
                        <th class="col-drag"></th>
                        <th class="col-name">Name</th>
                        <th class="col-task">Task</th>
                        <th class="col-date">Start Date</th>
                        <th class="col-date">End Date</th>
                        <th class="col-dur">
                            <div>Duration</div>
                            <div class="header-unit-label">{durationPeriodLabel}</div>
                        </th>
                        <th class="col-qty">Qty</th>
                        <th class="col-rate">Base Rate</th>
                        <th class="col-price">Unit Price</th>
                        <th class="col-disc">Disc %</th>
                        <th class="col-total">Total Price</th>
                    </tr>
                </thead>

                <!-- ROOT DROP TARGET (Out of Phases) -->
                <tbody class="root-drop-zone" data-phase="" ondragover={handleDragOver} ondragleave={handleDragLeave}
                    ondrop={handleDrop}>
                    <template if:true={isEmpty}>
                        <tr>
                            <td colspan="12" class="empty-cell">
                                No line items found. Click &quot;+ Add Item&quot; to get started.
                            </td>
                        </tr>
                    </template>
                </tbody>

                <!-- Iterate over Computed displayRows which contains both Phase Headers & Items -->
                <tbody>
                    <template for:each={displayRows} for:item="row" for:index="index">

                        <!-- PHASE HEADER ROW -->
                        <template if:true={row.isPhase}>
                            <tr key={row.phaseName} class={row.dragOverClass} data-phase={row.phaseName}
                                ondragover={handleDragOver} ondragleave={handleDragLeave} ondrop={handleDrop}>

                                <td class="check-col">
                                    <input type="checkbox" data-phase={row.phaseName} onchange={handleSelectPhase}
                                        checked={row.phaseSelected} />
                                </td>
                                <td class="drag-cell">⠿</td>
                                <td class="phase-name-cell">
                                    <div class="phase-left">
                                        <span class="chevron-btn" data-phase={row.phaseName}
                                            onclick={handleTogglePhase}>
                                            {row.chevron}
                                        </span>
                                        <span class="phase-title">{row.phaseName}</span>
                                    </div>
                                </td>
                                <td colspan="9" class="phase-actions-cell">
                                    <div class="phase-right">
                                        <span class="phase-total">
                                            <span class="pt-label">Total:</span>
                                            <span class="pt-amt">{row.phaseTotal}</span>
                                        </span>
                                        <button class="btn-add-to-phase" data-phase={row.phaseName}
                                            onclick={handleAddItem}>+ ADD ITEM</button>
                                    </div>
                                </td>
                            </tr>
                        </template>

                        <!-- LINE ITEM ROW -->
                        <template if:true={row.isItem}>
                            <tr key={row.record.Id} class={row.rowClass} draggable="true" data-id={row.record.Id}
                                ondragstart={handleDragStart}>

                                <td class="check-col">
                                    <input type="checkbox" data-id={row.record.Id} onchange={handleSelectItem}
                                        checked={row.record.selected} />
                                </td>
                                <td class="drag-cell">⠿</td>
                                <td class="name-cell">
                                    <div class="name-content">
                                        <span class={row.record.typeIconClass}>{row.record.typeIcon}</span>
                                        <span class="name-text">{row.record.Name}</span>
                                        <!-- Billing Unit badge -->
                                        <span class={row.record.billingBadgeClass}>{row.record.Billing_Unit__c}</span>
                                    </div>
                                </td>
                                <td>
                                    <input type="text" class="inline-input" placeholder="Add task..."
                                        value={row.record.Task__c} data-id={row.record.Id} data-field="Task__c"
                                        onchange={handleFieldChange} />
                                </td>
                                <td>
                                    <input type="date" class="inline-input" value={row.record.Start_Date__c}
                                        data-id={row.record.Id} data-field="Start_Date__c"
                                        onchange={handleFieldChange} />
                                </td>
                                <!-- End Date: auto-computed (read-only), blank for Each billing -->
                                <td class="date-cell-ro">
                                    <template if:true={row.record.showEndDate}>
                                        <span class="date-display">{row.record.End_Date__c}</span>
                                    </template>
                                    <template if:false={row.record.showEndDate}>
                                        <span class="date-display date-na">—</span>
                                    </template>
                                </td>
                                <!-- Duration: time units (weeks, months, etc.) — disabled for Each -->
                                <td>
                                    <input type="number" class="inline-input num-input" value={row.record.Duration__c}
                                        min="0" step="0.01" data-id={row.record.Id} data-field="Duration__c"
                                        disabled={row.record.durationDisabled} onchange={handleFieldChange} />
                                </td>
                                <!-- Quantity: headcount / unit count (whole numbers) -->
                                <td>
                                    <input type="number" class="inline-input num-input" value={row.record.Quantity__c}
                                        min="1" step="1" data-id={row.record.Id} data-field="Quantity__c"
                                        onchange={handleFieldChange} />
                                </td>
                                <td class="rate-cell">{row.record.formattedBaseRate}</td>
                                <td style="position: relative">
                                    <div class="clickable-value" data-id={row.record.Id}
                                        onclick={handleToggleUnitPricePopover}>
                                        {row.record.formattedUnitPrice}
                                    </div>
                                    <template if:true={row.record.isUpPopoverOpen}>
                                        <div class="calc-popover">
                                            <div class="popover-header">
                                                <span>Unit Price Calculation</span>
                                                <span class="close-btn" onclick={closePopover}>✕</span>
                                            </div>
                                            <div class="popover-body">
                                                <div class="calc-row">
                                                    <span>Base Rate:</span>
                                                    <span>{row.record.upDesc}</span>
                                                </div>
                                                <template if:true={row.record.showTimePeriodRow}>
                                                    <div class="calc-row">
                                                        <span>{row.record.timePeriodLabel}</span>
                                                        <span>{row.record.timePeriodHours}</span>
                                                    </div>
                                                </template>
                                                <div class="calc-row">
                                                    <span>Calculation:</span>
                                                    <span>{row.record.upCalcFormula}</span>
                                                </div>
                                                <hr />
                                                <div class="calc-row result-row">
                                                    <span>Unit Price:</span>
                                                    <span class="highlight-val">{row.record.formattedUnitPrice}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </td>
                                <td>
                                    <div class="discount-input-wrap">
                                        <input type="number" class="inline-input num-input"
                                            value={row.record.Discount_Percent__c} min="0" max="100" step="1"
                                            data-id={row.record.Id} data-field="Discount_Percent__c"
                                            onchange={handleFieldChange} />
                                        <span class="pct-sign">%</span>
                                    </div>
                                </td>
                                <td class="total-cell" style="position: relative">
                                    <div class="clickable-value" data-id={row.record.Id}
                                        onclick={handleToggleTotalPricePopover}>
                                        {row.record.formattedTotal}
                                    </div>
                                    <template if:true={row.record.isTpPopoverOpen}>
                                        <div class="calc-popover tp-popover">
                                            <div class="popover-header">
                                                <span>Total Price Calculation</span>
                                                <span class="close-btn" onclick={closePopover}>✕</span>
                                            </div>
                                            <div class="popover-body">
                                                <div class="calc-row">
                                                    <span>Unit Price:</span>
                                                    <span>{row.record.formattedUnitPrice}</span>
                                                </div>
                                                <div class="calc-row">
                                                    <span>Quantity:</span>
                                                    <span>{row.record.qtyLabel}</span>
                                                </div>
                                                <template if:true={row.record.showDurationRow}>
                                                    <div class="calc-row">
                                                        <span>Duration:</span>
                                                        <span>{row.record.durLabel}</span>
                                                    </div>
                                                </template>
                                                <div class="calc-row">
                                                    <span>Discount:</span>
                                                    <span>{row.record.discLabel}</span>
                                                </div>
                                                <div class="calc-row">
                                                    <span>Calculation:</span>
                                                    <span>{row.record.tpCalcFormula}</span>
                                                </div>
                                                <hr />
                                                <div class="calc-row result-row">
                                                    <span>Total Price:</span>
                                                    <span class="highlight-val">{row.record.formattedTotal}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </td>
                            </tr>
                        </template>

                    </template>
                </tbody>

                <!-- TOTAL ROW -->
                <tfoot>
                    <tr class="total-row root-drop-zone" data-phase="" ondragover={handleDragOver}
                        ondragleave={handleDragLeave} ondrop={handleDrop}>
                        <td colspan="11" class="total-label">
                            <strong>Total</strong>
                        </td>
                        <td class="total-amount">
                            <strong>{grandTotal}</strong>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <!-- FLOATING SELECTION BAR -->
        <template if:true={hasSelection}>
            <div class="selection-bar-container">
                <div class="selection-bar">
                    <div class="selection-info">
                        <strong>{selectedCount}</strong> selected
                    </div>
                    <div class="selection-divider">|</div>
                    <button class="btn-clear-selection" onclick={handleClearSelection}>
                        Clear
                    </button>
                    <button class="btn-bulk-delete" onclick={handleBulkDelete}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                        Delete
                    </button>
                </div>
            </div>
        </template>
    </div>

    <!-- ADD ITEMS MODAL -->
    <c-provus-add-items-modal is-open={showAddModal} quote-id={quoteId} target-phase={targetPhase}
        onclose={handleModalClose} onitemsadded={handleItemsAdded}>
    </c-provus-add-items-modal>

    <!-- ADD PHASE MODAL -->
    <template if:true={showPhaseModal}>
        <div class="modal-overlay" onclick={handlePhaseModalClose}></div>
        <div class="modal-box">
            <div class="modal-header">
                <h2 class="modal-title">Create New Phase</h2>
                <button class="close-btn" onclick={handlePhaseModalClose}>✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Phase Name <span style="color:#ef4444">*</span></label>
                    <input type="text" class="form-input" value={newPhaseName} onchange={handlePhaseNameChange}
                        placeholder="e.g. Phase 1" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick={handlePhaseModalClose}>Cancel</button>
                <button class="btn-create" onclick={handleSavePhase}>Create Phase</button>
            </div>
        </div>
    </template>

</template>
