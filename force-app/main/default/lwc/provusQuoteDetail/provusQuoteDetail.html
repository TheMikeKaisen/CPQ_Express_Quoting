<template>
    <div class="detail-container">

        <!-- LOADING STATE -->
        <template if:true={isLoading}>
            <div class="loading">Loading quote...</div>
        </template>

        <template if:false={isLoading}>
            <template if:true={quote}>

                <!-- BREADCRUMB + HEADER -->
                <div class="detail-header">

                    <!-- Breadcrumb -->
                    <div class="breadcrumb">
                        <span class="breadcrumb-link" onclick={handleBack}>
                            Quotes
                        </span>
                        <span class="breadcrumb-sep">›</span>
                        <span class="breadcrumb-current">
                            {quote.QuoteNumber}
                        </span>
                        <c-provus-status-badge status={quote.Status}>
                        </c-provus-status-badge>
                    </div>

                    <!-- Quote Name (editable) -->
                    <div class="quote-name-row">
                        <template if:false={isEditingName}>
                            <span class="quote-name">
                                {quote.Name}
                            </span>
                            <button class="edit-name-btn" onclick={handleEditName}>
                                ✏️
                            </button>
                        </template>
                        <template if:true={isEditingName}>
                            <input type="text" class="name-input" value={quote.Name} onchange={handleNameChange}
                                onblur={handleNameSave} onkeydown={handleNameKeyDown} />
                        </template>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">

                        <!-- Submit — only when Draft -->
                        <template if:true={isDraft}>
                            <button class="btn-submit" onclick={handleSubmit}>
                                Submit for Approval
                            </button>
                        </template>

                        <!-- Recall — only when Pending -->
                        <template if:true={isPending}>
                            <button class="btn-recall" onclick={handleRecall}>
                                🔄 Recall
                            </button>
                        </template>

                        <!-- Approve — only when Pending -->
                        <template if:true={isPending}>
                            <button class="btn-approve" onclick={handleApprove}>
                                ✓ Approve
                            </button>
                        </template>

                        <!-- Reject — only when Pending -->
                        <template if:true={isPending}>
                            <button class="btn-reject" onclick={handleReject}>
                                ✕ Reject
                            </button>
                        </template>

                        <!-- Generate PDF -->
                        <button class="btn-pdf" onclick={handleGeneratePdf}>
                            ⬇ Generate PDF
                        </button>

                        <!-- Save -->
                        <button class="btn-save" onclick={handleSave}>
                            Save
                        </button>

                        <!-- Refresh -->
                        <button class="btn-icon" onclick={handleRefresh}>
                            🔄 Refresh
                        </button>

                    </div>
                </div>

                <!-- METRIC STRIP -->
                <div class="metric-strip">
                    <div class="metric">
                        <span class="metric-label">
                            Total amount
                        </span>
                        <span class="metric-value metric-total">
                            {formattedTotal}
                        </span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Subtotal</span>
                        <span class="metric-value">
                            {formattedSubtotal}
                        </span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Margin</span>
                        <span class="metric-value">
                            {formattedMargin}
                        </span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Discount</span>
                        <span class="metric-value">
                            {formattedDiscount}
                        </span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Start date</span>
                        <span class="metric-value">
                            {formattedStartDate}
                        </span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">End date</span>
                        <span class="metric-value">
                            {formattedEndDate}
                        </span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">
                            Quote time period
                        </span>
                        <span class="metric-value">
                            {quote.Time_Period__c}
                        </span>
                    </div>
                </div>

                <!-- TABS -->
                <div class="tabs-container">
                    <div class="tabs-header">
                        <button class={summaryTabClass} data-tab="summary" onclick={handleTabClick}>
                            Summary
                        </button>
                        <button class={lineItemsTabClass} data-tab="lineItems" onclick={handleTabClick}>
                            Line Items
                        </button>
                        <button class={timelineTabClass} data-tab="timeline" onclick={handleTabClick}>
                            Timeline
                        </button>
                        <button class={pdfsTabClass} data-tab="pdfs" onclick={handleTabClick}>
                            Generated PDFs
                        </button>
                    </div>

                    <!-- TAB CONTENT -->
                    <div class="tab-content">

                        <!-- SUMMARY TAB — stub for now -->
                        <template if:true={showSummary}>
                            <c-provus-quote-summary quote={quote} quote-id={quoteId}>
                            </c-provus-quote-summary>
                        </template>

                        <!-- LINE ITEMS TAB -->
                        <template if:true={showLineItems}>
                            <c-provus-quote-line-items quote-id={quoteId} quote-status={quote.Status}
                                onlineitemsupdated={handleLineItemsUpdated}>
                            </c-provus-quote-line-items>
                        </template>

                        <!-- TIMELINE TAB — stub -->
                        <template if:true={showTimeline}>
                            <div class="tab-stub">
                                <p>Timeline — Coming Soon</p>
                            </div>
                        </template>

                        <!-- TIMELINE TAB — stub -->
                        <template if:true={showTimeline}>
                            <div class="tab-stub">
                                <p>Timeline — Coming Soon</p>
                            </div>
                        </template>

                        <!-- GENERATED PDFs TAB -->
                        <template if:true={showPdfs}>
                            <div class="pdfs-tab-content">
                                <div class="pdfs-header">
                                    <div>
                                        <h3 class="pdfs-title">Generated PDFs</h3>
                                        <p class="pdfs-subtitle">
                                            Saved snapshots of this quote at the time of generation.
                                        </p>
                                    </div>
                                    <button class="btn-generate-new" onclick={handleGeneratePdf}>
                                        + Generate PDF
                                    </button>
                                </div>

                                <template if:true={hasSavedDocuments}>
                                    <div class="docs-list">
                                        <template for:each={savedDocuments} for:item="doc">
                                            <div key={doc.Id} class="doc-row">
                                                <div class="doc-icon">📄</div>
                                                <div class="doc-info">
                                                    <div class="doc-name">{doc.Name}</div>
                                                    <div class="doc-meta">
                                                        Generated by {doc.Generated_By__c} on {doc.formattedDate}
                                                    </div>
                                                </div>
                                                <div class="doc-actions">
                                                    <button class="doc-btn doc-btn-download"
                                                            data-id={doc.Id}
                                                            data-name={doc.Name}
                                                            onclick={handleDownloadSavedDoc}
                                                            title="Download">
                                                        ⬇ Download
                                                    </button>
                                                    <button class="doc-btn doc-btn-delete"
                                                            data-id={doc.Id}
                                                            onclick={handleDeleteSavedDoc}
                                                            title="Delete">
                                                        🗑️
                                                    </button>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <template if:false={hasSavedDocuments}>
                                    <div class="pdfs-empty">
                                        <div class="empty-icon">📄</div>
                                        <p class="empty-title">No PDFs generated yet</p>
                                        <p class="empty-sub">
                                            Click "Generate PDF" to create and save a quote document.
                                        </p>
                                        <button class="btn-empty-generate" onclick={handleGeneratePdf}>
                                            Generate First PDF
                                        </button>
                                    </div>
                                </template>
                            </div>
                        </template>

                    </div>
                </div>

            </template>
        </template>

        <!-- Error message if quote not found -->
        <template if:true={errorMessage}>
            <div class="error-state">{errorMessage}</div>
        </template>

    </div>
     <!-- PDF GENERATION MODAL -->
    <c-provus-generate-pdf-modal
        is-open={showPdfModal}
        quote-id={quoteId}
        quote={quote}
        onclose={handlePdfModalClose}
        onsaved={handlePdfSaved}>
    </c-provus-generate-pdf-modal>

</template>
