<template>
    <div class="detail-container">

        <!-- LOADING STATE -->
        <template if:true={isLoading}>
            <div class="loading">Loading quote...</div>
        </template>

        <template if:false={isLoading}>
            <template if:true={quote}>

                <!-- UNIFIED DASHBOARD HEADER -->
                <div class="unified-header">
                    <!-- Top section: Breadcrumb left, Actions right -->
                    <div class="header-top">
                        <!-- Breadcrumb -->
                        <div class="breadcrumb">
                            <span class="breadcrumb-link" onclick={handleBack}>Quotes</span>
                            <span class="breadcrumb-sep">/</span>
                            <span class="breadcrumb-current">{quote.QuoteNumber}</span>
                            <c-provus-status-badge status={quote.Status}></c-provus-status-badge>
                        </div>
                        
                        <!-- Actions -->
                        <div class="action-buttons">
                            <!-- Submit — only when Draft -->
                            <template if:true={isDraft}>
                                <button class="btn-action outline" onclick={handleSubmit}>Submit for Approval</button>
                            </template>

                            <!-- Recall — only Manager/Admin when Pending, Approved, or Rejected -->
                            <template if:true={showRecall}>
                                <button class="btn-action outline" onclick={handleRecall}>🔄 Recall</button>
                            </template>

                            <!-- Approve & Reject — only Manager/Admin when Pending -->
                            <template if:true={canApproveReject}>
                                <button class="btn-action success" onclick={handleApprove}>✓ Approve</button>
                                <button class="btn-action danger" onclick={handleReject}>✕ Reject</button>
                            </template>

                            <!-- Locked badge -->
                            <template if:true={isLocked}>
                                <span class="locked-badge">🔒 Locked</span>
                            </template>

                            <!-- Document Gen -->
                            <button class="btn-action primary" onclick={handleGeneratePdf}>⬇ Generate PDF</button>

                            <!-- Refresh -->
                            <button class="btn-action secondary icon-btn" onclick={handleRefresh} title="Sync latest data">
                                🔄 Refresh
                            </button>
                        </div>
                    </div>

                    <!-- Middle section: Quote Title -->
                    <div class="header-middle">
                        <div class="quote-title-wrapper">
                            <template if:false={isEditingName}>
                                <h1 class="quote-title">{quote.Name}</h1>
                                <button class="btn-edit-title" onclick={handleEditName} title="Edit Quote Name">✏️</button>
                            </template>
                            <template if:true={isEditingName}>
                                <input type="text" class="input-title-edit" value={quote.Name} onchange={handleNameChange} onblur={handleNameSave} onkeydown={handleNameKeyDown} />
                            </template>
                        </div>
                    </div>

                    <!-- Bottom section: High-end Metric strip -->
                    <div class="header-metrics">
                        <div class="metric-block">
                            <div class="metric-label">Total Amount</div>
                            <div class="metric-value grand-total">{formattedTotal}</div>
                        </div>
                        <div class="metric-divider"></div>
                        <div class="metric-block">
                            <div class="metric-label">Subtotal</div>
                            <div class="metric-value">{formattedSubtotal}</div>
                        </div>
                        <div class="metric-divider"></div>
                        <div class="metric-block block-margin">
                            <div class="metric-label">Expected Margin</div>
                            <div class="metric-value value-margin">{formattedMargin}</div>
                        </div>
                        <div class="metric-divider"></div>
                        <div class="metric-block">
                            <div class="metric-label">Total Discount</div>
                            <div class="metric-value value-discount">{formattedDiscount}</div>
                        </div>
                        <div class="metric-divider"></div>
                        <div class="metric-block">
                            <div class="metric-label">Start Date</div>
                            <div class="metric-value">{formattedStartDate}</div>
                        </div>
                        <div class="metric-divider"></div>
                        <div class="metric-block">
                            <div class="metric-label">End Date</div>
                            <div class="metric-value-wrapper">
                                <template if:false={isEditingEndDate}>
                                    <div class="metric-value">{formattedEndDate}</div>
                                    <template if:true={canEditEndDate}>
                                        <button class="btn-metric-edit" onclick={handleEditEndDate} title="Edit End Date">✏️</button>
                                    </template>
                                </template>
                                <template if:true={isEditingEndDate}>
                                    <input type="date" class="input-metric-edit" value={editedEndDate} 
                                        onchange={handleEndDateChange} onblur={handleEndDateSave} onkeydown={handleEndDateKeyDown} />
                                </template>
                            </div>
                        </div>
                        <div class="metric-divider"></div>
                        <div class="metric-block">
                            <div class="metric-label">Time Period</div>
                            <div class="metric-value"><span class="badge-period">{quote.Time_Period__c}</span></div>
                        </div>
                    </div>
                </div>

                <!-- TABS -->
                <div class="tabs-container">
                    <div class="tabs-header">
                        <button class={summaryTabClass} data-tab="summary" onclick={handleTabClick}>
                            Summary
                        </button>
                        <button class={lineItemsTabClass} data-tab="lineItems" onclick={handleTabClick}>
                            Line Items
                        </button>
                        <button class={timelineTabClass} data-tab="timeline" onclick={handleTabClick}>
                            Timeline
                        </button>
                        <button class={pdfsTabClass} data-tab="pdfs" onclick={handleTabClick}>
                            Generated PDFs
                        </button>
                    </div>

                    <!-- TAB CONTENT -->
                    <div class="tab-content">

                        <!-- SUMMARY TAB — stub for now -->
                        <template if:true={showSummary}>
                            <c-provus-quote-summary quote={quote} quote-id={quoteId}>
                            </c-provus-quote-summary>
                        </template>

                        <!-- LINE ITEMS TAB -->
                        <template if:true={showLineItems}>
                            <c-provus-quote-line-items
                                quote-id={quoteId}
                                quote-status={quote.Status}
                                is-locked={isLocked}
                                onlineitemsupdated={handleLineItemsUpdated}>
                            </c-provus-quote-line-items>
                        </template>

                        <!-- TIMELINE TAB -->
                        <template if:true={showTimeline}>
                            <c-provus-quote-timeline quote-id={quoteId}></c-provus-quote-timeline>
                        </template>

                        <!-- GENERATED PDFs TAB -->
                        <template if:true={showPdfs}>
                            <div class="pdfs-tab-content">
                                <div class="pdfs-header">
                                    <div>
                                        <h3 class="pdfs-title">Generated PDFs</h3>
                                        <p class="pdfs-subtitle">
                                            Saved snapshots of this quote at the time of generation.
                                        </p>
                                    </div>
                                    <button class="btn-generate-new" onclick={handleGeneratePdf}>
                                        + Generate PDF
                                    </button>
                                </div>

                                <template if:true={hasSavedDocuments}>
                                    <div class="docs-list">
                                        <template for:each={savedDocuments} for:item="doc">
                                            <div key={doc.Id} class="doc-row">
                                                <div class="doc-icon">📄</div>
                                                <div class="doc-info">
                                                    <div class="doc-name">{doc.Name}</div>
                                                    <div class="doc-meta">
                                                        Generated by {doc.Generated_By__c} on {doc.formattedDate}
                                                    </div>
                                                </div>
                                                <div class="doc-actions">
                                                    <button class="doc-btn doc-btn-download"
                                                            data-id={doc.Id}
                                                            data-name={doc.Name}
                                                            onclick={handleDownloadSavedDoc}
                                                            title="Download">
                                                        ⬇ Download
                                                    </button>
                                                    <button class="doc-btn doc-btn-delete"
                                                            data-id={doc.Id}
                                                            onclick={handleDeleteSavedDoc}
                                                            title="Delete">
                                                        🗑️
                                                    </button>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <template if:false={hasSavedDocuments}>
                                    <div class="pdfs-empty">
                                        <div class="empty-icon">📄</div>
                                        <p class="empty-title">No PDFs generated yet</p>
                                        <p class="empty-sub">
                                            Click "Generate PDF" to create and save a quote document.
                                        </p>
                                        <button class="btn-empty-generate" onclick={handleGeneratePdf}>
                                            Generate First PDF
                                        </button>
                                    </div>
                                </template>
                            </div>
                        </template>

                    </div>
                </div>

            </template>
        </template>

        <!-- Error message if quote not found -->
        <template if:true={errorMessage}>
            <div class="error-state">{errorMessage}</div>
        </template>

    </div>
     <!-- PDF GENERATION MODAL -->
    <c-provus-generate-pdf-modal
        is-open={showPdfModal}
        quote-id={quoteId}
        quote={quote}
        onclose={handlePdfModalClose}
        onsaved={handlePdfSaved}>
    </c-provus-generate-pdf-modal>

</template>
