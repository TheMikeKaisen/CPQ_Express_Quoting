<template>
    <div class="page-container">

        <!-- PAGE HEADER -->
        <div class="page-header">
            <div class="page-header-left">
                <h1 class="page-title">Quotes</h1>
                <p class="page-subtitle">
                    Manage sales quotes and proposals
                </p>
            </div>
            <div class="page-header-right">
                <template if:true={canCreateData}>
                    <button class="btn-new" onclick={handleNew}>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        New
                    </button>
                </template>
                <button class="btn-icon" onclick={handleRefresh}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    Refresh
                </button>
            </div>
        </div>

        <!-- FILTERS ROW -->
        <div class="filters-row">
            <!-- Search -->
            <input type="text" class="search-input" placeholder="Search quotes..." onchange={handleSearch} />

            <!-- Status Filter -->
            <select class="filter-select" onchange={handleStatusFilter}>
                <option value="All">All Status</option>
                <option value="Draft">Draft</option>
                <option value="Pending Approval">Pending Approval</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>

            <!-- Account Filter -->
            <select class="filter-select" onchange={handleAccountFilter}>
                <option value="All">All Accounts</option>
                <template for:each={accountOptions} for:item="acc">
                    <option key={acc.Id} value={acc.Id}>
                        {acc.Name}
                    </option>
                </template>
            </select>

            <!-- View count -->
            <span class="view-count">
                View {filteredQuotes.length}
            </span>
        </div>

        <!-- SHOWING COUNT -->
        <div class="showing-count">
            Showing {startRecord}-{endRecord} of {totalRecords}
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th class="col-check">
                            <input type="checkbox" />
                        </th>
                        <th class="col-num">#</th>
                        <th class="col-id">ID</th>
                        <th class="col-opp">Opportunity</th>
                        <th class="col-acc">Account</th>
                        <th class="col-status">Status</th>
                        <th class="col-by">Created By</th>
                        <th class="col-date">Created Date</th>
                        <th class="col-amount">Total Amount</th>
                        <th class="col-disc">Discount %</th>
                        <th class="col-margin">Margin %</th>
                        <th class="col-actions">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Loading state -->
                    <template if:true={isLoading}>
                        <tr>
                            <td colspan="12" class="loading-cell">
                                Loading quotes...
                            </td>
                        </tr>
                    </template>

                    <!-- Empty state -->
                    <template if:true={isEmpty}>
                        <tr>
                            <td colspan="12" class="empty-cell">
                                No quotes found.
                            </td>
                        </tr>
                    </template>

                    <!-- Data rows -->
                    <template if:false={isLoading}>
                        <template for:each={paginatedQuotes} for:item="quote" for:index="index">
                            <tr key={quote.Id} class="table-row" data-id={quote.Id} onclick={handleRowClick}>
                                <td onclick={stopPropagation}>
                                    <input type="checkbox" />
                                </td>
                                <td class="col-num">
                                    {quote.rowNumber}
                                </td>
                                <td class="col-id">
                                    <span class="quote-link" data-id={quote.Id} onclick={handleQuoteClick}>
                                        {quote.QuoteNumber}
                                    </span>
                                </td>
                                <td>{quote.opportunityName}</td>
                                <td>{quote.accountName}</td>
                                <td>
                                    <c-provus-status-badge status={quote.Status}>
                                    </c-provus-status-badge>
                                </td>
                                <td>{quote.createdByName}</td>
                                <td>{quote.formattedDate}</td>
                                <td class="amount-cell">
                                    {quote.formattedAmount}
                                </td>
                                <td class="center-cell">
                                    {quote.formattedDiscount}
                                </td>
                                <td class="center-cell">
                                    {quote.formattedMargin}
                                </td>
                                <td onclick={stopPropagation}>
                                    <div class="action-btns">
                                        <!-- Clone -->
                                        <button class="action-btn" title="Clone" data-id={quote.Id}
                                            onclick={handleClone}>
                                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                        </button>
                                        <!-- Delete -->
                                        <button class="action-btn action-btn-delete" title="Delete" data-id={quote.Id}
                                            onclick={handleDelete}>
                                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- PAGINATION -->
        <div class="pagination">
            <button class="page-btn" onclick={handlePrevPage} disabled={isFirstPage}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-3px; margin-right:4px;"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Previous
            </button>
            <span class="page-info">
                Page {currentPage} of {totalPages}
            </span>
            <button class="page-btn" onclick={handleNextPage} disabled={isLastPage}>
                Next
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-3px; margin-left:4px;"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>

    </div>

    <!-- CLONE QUOTE MODAL -->
    <c-provus-clone-quote-modal is-open={showCloneModal} quote-id={cloneQuoteId} quote-number={cloneQuoteNumber}
        onclose={handleCloneModalClose} oncloned={handleQuoteCloned}>
    </c-provus-clone-quote-modal>

    <!-- CREATE QUOTE MODAL -->
    <c-provus-create-quote-modal is-open={showCreateModal} onclose={handleModalClose}
        onquotecreated={handleQuoteCreated}>
    </c-provus-create-quote-modal>

</template>
