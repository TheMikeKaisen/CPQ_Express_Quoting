<template>
    <template if:true={isOpen}>

        <!-- Overlay -->
        <div class="modal-overlay"
             onclick={handleOverlayClick}>
        </div>

        <!-- Modal -->
        <div class="modal-box">

            <!-- Header -->
            <div class="modal-header">
                <h2 class="modal-title">Create New Quote</h2>
                <button class="close-btn"
                        onclick={handleClose}>✕
                </button>
            </div>

            <!-- Body -->
            <div class="modal-body">

                <!-- Opportunity (Optional) -->
                <div class="form-group">
                    <label class="form-label">Opportunity</label>
                    <select
                        class="form-select"
                        onchange={handleOpportunityChange}>
                        <option value="">
                            Select an opportunity...
                        </option>
                        <template for:each={opportunityList}
                                  for:item="opp">
                            <option
                                key={opp.Id}
                                value={opp.Id}>
                                {opp.Name}
                            </option>
                        </template>
                    </select>
                </div>

                <!-- Account (Required) -->
                <div class="form-group">
                    <label class="form-label">
                        Account
                        <span class="required">*</span>
                    </label>
                    <template if:true={isAccountDisabled}>
                        <input
                            type="text"
                            class="form-input"
                            value={accountName}
                            disabled />
                    </template>
                    <template if:false={isAccountDisabled}>
                        <select
                            class="form-select"
                            value={accountId}
                            onchange={handleAccountChange}>
                            <option value="">
                                Select an account...
                            </option>
                            <template for:each={accountList}
                                      for:item="acc">
                                <option
                                    key={acc.Id}
                                    value={acc.Id}>
                                    {acc.Name}
                                </option>
                            </template>
                        </select>
                    </template>
                </div>



                <!-- Start Date -->
                <div class="form-group">
                    <label class="form-label">
                        Start Date
                        <span class="required">*</span>
                    </label>
                    <input
                        type="date"
                        class="form-input"
                        value={startDate}
                        onchange={handleStartDateChange} />
                </div>

                <!-- Time Period -->
                <div class="form-group">
                    <label class="form-label">
                        Time Period
                        <span class="required">*</span>
                    </label>
                    <select
                        class="form-select"
                        onchange={handleTimePeriodChange}>
                        <option value="Days">Days</option>
                        <option value="Weeks">Weeks</option>
                        <option value="Months">Months</option>
                        <option value="Quarters">Quarters</option>
                    </select>
                </div>

                <!-- Error -->
                <template if:true={errorMessage}>
                    <div class="error-msg">
                        {errorMessage}
                    </div>
                </template>

            </div>

            <!-- Footer -->
            <div class="modal-footer">
                <button class="btn-cancel"
                        onclick={handleClose}>
                    Cancel
                </button>
                <button
                    class="btn-create"
                    onclick={handleCreate}
                    disabled={isCreating}>
                    <template if:true={isCreating}>
                        Creating...
                    </template>
                    <template if:false={isCreating}>
                        Create
                    </template>
                </button>
            </div>

        </div>
    </template>
</template>
